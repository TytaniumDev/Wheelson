name: Auto Approve

on:
  pull_request:
    types: [opened, synchronize, reopened]
  check_suite:
    types: [completed]

jobs:
  auto-approve:
    if: >-
      (github.event_name == 'pull_request' && github.event.pull_request.user.login == 'TytaniumDev') ||
      (github.event_name == 'check_suite' && github.event.sender.login == 'TytaniumDev')
    uses: TytaniumDev/.github/.github/workflows/auto-approve.yml@main
    with:
      owner: TytaniumDev
      required_checks: "CI-Lint / Lint,CI-Build / Build,CI-Test / Test"
